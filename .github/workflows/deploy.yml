name: Build & Deploy core_app

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ghcr.io/heriberto777/core_app-backend:latest
            ghcr.io/heriberto777/core_app-backend:${{ github.sha }}

      - name: Build y push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ghcr.io/heriberto777/core_app-frontend:latest
            ghcr.io/heriberto777/core_app-frontend:${{ github.sha }}

      - name: Deploy local
        run: |
          cd /home/heriberto777/apps/core_app
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d
          docker image prune -f
          echo "Deploy completado $(date)"
